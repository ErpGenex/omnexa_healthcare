---
no_breadcrumbs: 1
full_width: 1
no_header: 1
---

{% extends "templates/web.html" %}

{% block title %}جلسة جديدة | New Session{% endblock %}

{% block page_content %}
<div class="hc-site hc-telemedicine-admin" data-page="admin-new-session">
  <header class="hc-header" id="hc-header"></header>
  
  <section class="hc-admin-new-session">
    <div class="hc-wrap">
      <div class="hc-admin-header">
        <div class="hc-admin-title">
          <h1 id="hc-admin-title">جلسة جديدة</h1>
          <p id="hc-admin-subtitle">إنشاء جلسة طب عن بعد جديدة</p>
        </div>
        <div class="hc-admin-actions">
          <button class="hc-btn hc-btn-outline" id="hc-cancel-session">
            <span>✕</span>
            <span id="hc-cancel-text">إلغاء</span>
          </button>
          <button class="hc-btn hc-btn-primary" id="hc-create-session">
            <span>✓</span>
            <span id="hc-create-text">إنشاء الجلسة</span>
          </button>
        </div>
      </div>

      <div class="hc-session-form">
        <div class="hc-form-section">
          <h3 id="hc-patient-section">معلومات المريض</h3>
          <div class="hc-form-row">
            <div class="hc-form-group">
              <label for="hc-patient-select" id="hc-patient-label">المريض *</label>
              <select id="hc-patient-select" class="hc-form-control" required>
                <option value="">اختر المريض</option>
              </select>
            </div>
            <div class="hc-form-group">
              <label for="hc-patient-phone" id="hc-phone-label">رقم الهاتف</label>
              <input type="tel" id="hc-patient-phone" class="hc-form-control" placeholder="رقم هاتف المريض">
            </div>
          </div>
        </div>

        <div class="hc-form-section">
          <h3 id="hc-practitioner-section">معلومات الطبيب</h3>
          <div class="hc-form-row">
            <div class="hc-form-group">
              <label for="hc-practitioner-select" id="hc-practitioner-label">الطبيب *</label>
              <select id="hc-practitioner-select" class="hc-form-control" required>
                <option value="">اختر الطبيب</option>
              </select>
            </div>
            <div class="hc-form-group">
              <label for="hc-department-select" id="hc-department-label">القسم</label>
              <select id="hc-department-select" class="hc-form-control">
                <option value="">اختر القسم</option>
              </select>
            </div>
          </div>
        </div>

        <div class="hc-form-section">
          <h3 id="hc-schedule-section">الجدولة</h3>
          <div class="hc-form-row">
            <div class="hc-form-group">
              <label for="hc-session-date" id="hc-date-label">التاريخ *</label>
              <input type="date" id="hc-session-date" class="hc-form-control" required>
            </div>
            <div class="hc-form-group">
              <label for="hc-session-time" id="hc-time-label">الوقت *</label>
              <input type="time" id="hc-session-time" class="hc-form-control" required>
            </div>
            <div class="hc-form-group">
              <label for="hc-session-duration" id="hc-duration-label">المدة (دقائق)</label>
              <select id="hc-session-duration" class="hc-form-control">
                <option value="15">15 دقيقة</option>
                <option value="30" selected>30 دقيقة</option>
                <option value="45">45 دقيقة</option>
                <option value="60">60 دقيقة</option>
              </select>
            </div>
          </div>
        </div>

        <div class="hc-form-section">
          <h3 id="hc-type-section">نوع الاستشارة</h3>
          <div class="hc-form-row">
            <div class="hc-form-group">
              <label for="hc-consultation-type" id="hc-type-label">النوع *</label>
              <select id="hc-consultation-type" class="hc-form-control" required>
                <option value="video">فيديو</option>
                <option value="voice">صوت</option>
                <option value="chat">دردشة</option>
              </select>
            </div>
            <div class="hc-form-group">
              <label for="hc-appointment-type" id="hc-appointment-label">نوع الموعد</label>
              <select id="hc-appointment-type" class="hc-form-control">
                <option value="consultation">استشارة عامة</option>
                <option value="followup">متابعة</option>
                <option value="emergency">طوارئ</option>
              </select>
            </div>
          </div>
        </div>

        <div class="hc-form-section">
          <h3 id="hc-notes-section">ملاحظات</h3>
          <div class="hc-form-group">
            <label for="hc-session-notes" id="hc-notes-label">ملاحظات الجلسة</label>
            <textarea id="hc-session-notes" class="hc-form-control" rows="4" placeholder="أي ملاحظات إضافية..."></textarea>
          </div>
        </div>

        <div class="hc-form-section">
          <h3 id="hc-consent-section">الموافقة</h3>
          <div class="hc-form-group">
            <label class="hc-checkbox-label">
              <input type="checkbox" id="hc-consent-check" required>
              <span id="hc-consent-text">أوافق على شروط وأحكام الطب عن بعد</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="hc-footer" id="hc-footer"></footer>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    TelemedicineAdmin.init("new-session");
  });
</script>
{% endblock %}
