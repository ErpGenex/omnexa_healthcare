---
no_breadcrumbs: 1
full_width: 1
no_header: 1
---

{% extends "templates/web.html" %}

{% block title %}الوصفات الطبية | Doctor Prescriptions{% endblock %}

{% block page_content %}
<div class="hc-site hc-telemedicine-doctor" data-page="doctor-prescriptions">
  <header class="hc-header" id="hc-header"></header>
  
  <section class="hc-admin-dashboard">
    <div class="hc-wrap">
      <div class="hc-admin-header">
        <div class="hc-admin-title">
          <h1 id="hc-admin-title">الوصفات الطبية</h1>
          <p id="hc-admin-subtitle">إدارة الوصفات الطبية</p>
        </div>
        <div class="hc-admin-actions">
          <button class="hc-btn hc-btn-primary" onclick="window.location.href='/telemedicine-doctor/prescriptions/new'">
            + وصفة جديدة
          </button>
          <button class="hc-btn hc-btn-outline" onclick="window.location.href='/telemedicine-doctor'">
            ← العودة
          </button>
        </div>
      </div>

      <div class="hc-sessions-filters">
        <div class="hc-filter-group">
          <label>المريض</label>
          <select id="hc-filter-patient" class="hc-form-control">
            <option value="">الكل</option>
          </select>
        </div>
        <div class="hc-filter-group">
          <label>التاريخ</label>
          <input type="date" id="hc-filter-date" class="hc-form-control">
        </div>
        <div class="hc-filter-group">
          <label>الحالة</label>
          <select id="hc-filter-status" class="hc-form-control">
            <option value="">الكل</option>
            <option value="draft">مسودة</option>
            <option value="issued">صادرة</option>
            <option value="dispensed">صرفت</option>
          </select>
        </div>
        <button id="hc-filter-prescriptions" class="hc-btn hc-btn-primary">تصفية</button>
      </div>

      <div class="hc-sessions-table">
        <table class="hc-table" id="hc-prescriptions-table">
          <thead>
            <tr>
              <th>المريض</th>
              <th>الدواء</th>
              <th>التاريخ</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="hc-prescriptions-tbody">
            <tr>
              <td colspan="5" class="hc-empty">
                <p>لا توجد وصفات</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <footer class="hc-footer" id="hc-footer"></footer>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    TelemedicineDoctor.init("prescriptions");
  });
</script>
{% endblock %}
