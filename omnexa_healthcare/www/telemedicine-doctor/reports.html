---
no_breadcrumbs: 1
full_width: 1
no_header: 1
---

{% extends "templates/web.html" %}

{% block title %}التقارير | Doctor Reports{% endblock %}

{% block page_content %}
<div class="hc-site hc-telemedicine-doctor" data-page="doctor-reports">
  <header class="hc-header" id="hc-header"></header>
  
  <section class="hc-admin-dashboard">
    <div class="hc-wrap">
      <div class="hc-admin-header">
        <div class="hc-admin-title">
          <h1 id="hc-admin-title">التقارير</h1>
          <p id="hc-admin-subtitle">إحصائيات وتقارير الأداء</p>
        </div>
        <div class="hc-admin-actions">
          <button class="hc-btn hc-btn-outline" onclick="window.location.href='/telemedicine-doctor'">
            ← العودة
          </button>
        </div>
      </div>

      <div class="hc-reports-grid" id="hc-reports-grid">
        <!-- Reports will be loaded here -->
      </div>
    </div>
  </section>

  <footer class="hc-footer" id="hc-footer"></footer>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    TelemedicineDoctor.init("reports");
  });
</script>
{% endblock %}
