---
no_breadcrumbs: 1
full_width: 1
no_header: 1
---

{% extends "templates/web.html" %}

{% block title %}السجلات الطبية | Doctor Medical Records{% endblock %}

{% block page_content %}
<div class="hc-site hc-telemedicine-doctor" data-page="doctor-records">
  <header class="hc-header" id="hc-header"></header>
  
  <section class="hc-admin-dashboard">
    <div class="hc-wrap">
      <div class="hc-admin-header">
        <div class="hc-admin-title">
          <h1 id="hc-admin-title">السجلات الطبية</h1>
          <p id="hc-admin-subtitle">سجلات المرضى الطبية</p>
        </div>
        <div class="hc-admin-actions">
          <button class="hc-btn hc-btn-primary" onclick="window.location.href='/telemedicine-doctor/records/new'">
            + سجل جديد
          </button>
          <button class="hc-btn hc-btn-outline" onclick="window.location.href='/telemedicine-doctor'">
            ← العودة
          </button>
        </div>
      </div>

      <div class="hc-sessions-filters">
        <div class="hc-filter-group">
          <label>المريض</label>
          <select id="hc-filter-patient" class="hc-form-control">
            <option value="">الكل</option>
          </select>
        </div>
        <div class="hc-filter-group">
          <label>نوع السجل</label>
          <select id="hc-filter-type" class="hc-form-control">
            <option value="">الكل</option>
            <option value="consultation">استشارة</option>
            <option value="followup">متابعة</option>
            <option value="lab">نتائج مختبر</option>
            <option value="imaging">نتائج أشعة</option>
          </select>
        </div>
        <div class="hc-filter-group">
          <label>التاريخ</label>
          <input type="date" id="hc-filter-date" class="hc-form-control">
        </div>
        <button id="hc-filter-records" class="hc-btn hc-btn-primary">تصفية</button>
      </div>

      <div class="hc-sessions-table">
        <table class="hc-table" id="hc-records-table">
          <thead>
            <tr>
              <th>المريض</th>
              <th>النوع</th>
              <th>التاريخ</th>
              <th>التشخيص</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="hc-records-tbody">
            <tr>
              <td colspan="5" class="hc-empty">
                <p>لا توجد سجلات</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <footer class="hc-footer" id="hc-footer"></footer>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    TelemedicineDoctor.init("records");
  });
</script>
{% endblock %}
