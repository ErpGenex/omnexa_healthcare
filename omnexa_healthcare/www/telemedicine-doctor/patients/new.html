---
no_breadcrumbs: 1
full_width: 1
no_header: 1
---

{% extends "templates/web.html" %}

{% block title %}مريض جديد | New Patient{% endblock %}

{% block page_content %}
<div class="hc-site hc-telemedicine-doctor" data-page="patient-new">
  <header class="hc-header" id="hc-header"></header>
  
  <section class="hc-admin-dashboard">
    <div class="hc-wrap">
      <div class="hc-admin-header">
        <div class="hc-admin-title">
          <h1 id="hc-admin-title">مريض جديد</h1>
          <p id="hc-admin-subtitle">إضافة مريض جديد إلى النظام</p>
        </div>
        <div class="hc-admin-actions">
          <button class="hc-btn hc-btn-outline" onclick="window.location.href='/telemedicine-doctor/patients'">
            ← العودة
          </button>
        </div>
      </div>

      <div class="hc-patient-form">
        <form id="hc-new-patient-form">
          <div class="hc-form-section">
            <h3>المعلومات الشخصية</h3>
            <div class="hc-form-row">
              <div class="hc-form-group">
                <label>الاسم الكامل *</label>
                <input type="text" id="hc-patient-name" required class="hc-form-control" placeholder="أدخل اسم المريض">
              </div>
              <div class="hc-form-group">
                <label>تاريخ الميلاد *</label>
                <input type="date" id="hc-patient-dob" required class="hc-form-control">
              </div>
            </div>
            <div class="hc-form-row">
              <div class="hc-form-group">
                <label>الجنس *</label>
                <select id="hc-patient-gender" required class="hc-form-control">
                  <option value="">اختر</option>
                  <option value="male">ذكر</option>
                  <option value="female">أنثى</option>
                </select>
              </div>
              <div class="hc-form-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="hc-patient-phone" class="hc-form-control" placeholder="رقم الهاتف">
              </div>
            </div>
            <div class="hc-form-row">
              <div class="hc-form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="hc-patient-email" class="hc-form-control" placeholder="البريد الإلكتروني">
              </div>
              <div class="hc-form-group">
                <label>الرقم الوطني</label>
                <input type="text" id="hc-patient-national-id" class="hc-form-control" placeholder="الرقم الوطني">
              </div>
            </div>
          </div>

          <div class="hc-form-section">
            <h3>معلومات الاتصال</h3>
            <div class="hc-form-group">
              <label>العنوان</label>
              <textarea id="hc-patient-address" class="hc-form-control" rows="3" placeholder="عنوان المريض"></textarea>
            </div>
            <div class="hc-form-row">
              <div class="hc-form-group">
                <label>المدينة</label>
                <input type="text" id="hc-patient-city" class="hc-form-control" placeholder="المدينة">
              </div>
              <div class="hc-form-group">
                <label>المنطقة</label>
                <input type="text" id="hc-patient-area" class="hc-form-control" placeholder="المنطقة">
              </div>
            </div>
          </div>

          <div class="hc-form-section">
            <h3>معلومات طبية</h3>
            <div class="hc-form-group">
              <label>التاريخ الطبي</label>
              <textarea id="hc-patient-medical-history" class="hc-form-control" rows="3" placeholder="أي أمراض مزمنة أو حالات سابقة"></textarea>
            </div>
            <div class="hc-form-group">
              <label>الحساسية</label>
              <textarea id="hc-patient-allergies" class="hc-form-control" rows="2" placeholder="أي حساسية معروفة"></textarea>
            </div>
            <div class="hc-form-group">
              <label>الأدوية الحالية</label>
              <textarea id="hc-patient-medications" class="hc-form-control" rows="2" placeholder="الأدوية التي يتناولها المريض حالياً"></textarea>
            </div>
          </div>

          <div class="hc-form-actions">
            <button type="button" class="hc-btn hc-btn-outline" onclick="window.location.href='/telemedicine-doctor/patients'">
              إلغاء
            </button>
            <button type="submit" class="hc-btn hc-btn-primary">
              حفظ المريض
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <footer class="hc-footer" id="hc-footer"></footer>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    console.log("DOM loaded, TelemedicineDoctor:", typeof TelemedicineDoctor);
    if (typeof TelemedicineDoctor !== "undefined") {
      console.log("Initializing TelemedicineDoctor with page: patient-new");
      TelemedicineDoctor.init("patient-new");
    } else {
      console.error("TelemedicineDoctor is not defined!");
      alert("Error: TelemedicineDoctor object not loaded. Please refresh the page.");
    }
  });
</script>
{% endblock %}
